apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-flow
  namespace: order-flow
  labels:
    app.kubernetes.io/name: order-flow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-flow
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

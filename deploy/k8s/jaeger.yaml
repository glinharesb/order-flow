apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: order-flow
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: order-flow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.54
          ports:
            - containerPort: 4317
              protocol: TCP
              name: otlp-grpc
            - containerPort: 16686
              protocol: TCP
              name: ui
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: order-flow
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: order-flow
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 16686
      targetPort: 16686
      protocol: TCP
      name: ui

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-flow
  namespace: order-flow
  labels:
    app.kubernetes.io/name: order-flow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: order-flow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-flow
    spec:
      containers:
        - name: order-server
          image: order-flow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: order-flow-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

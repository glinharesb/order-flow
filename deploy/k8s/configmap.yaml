apiVersion: v1
kind: ConfigMap
metadata:
  name: order-flow-config
  namespace: order-flow
  labels:
    app.kubernetes.io/name: order-flow
data:
  GRPC_ADDR: ":50051"
  HTTP_ADDR: ":8081"
  DATABASE_URL: "postgres://postgres:postgres@postgres.order-flow.svc.cluster.local:5432/orderflow?sslmode=disable"
  REDIS_ADDR: "redis.order-flow.svc.cluster.local:6379"
  KAFKA_BROKERS: "kafka.order-flow.svc.cluster.local:9092"
  KAFKA_GROUP_ID: "order-flow"
  OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger.order-flow.svc.cluster.local:4317"
  SERVICE_NAME: "order-flow"
  RATE_LIMIT_RPS: "100"
  CACHE_TTL: "5m"
  OUTBOX_POLL_FREQ: "1s"
